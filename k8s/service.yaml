apiVersion: v1
kind: Service
metadata:
  name: viize-dashboard-service
  namespace: viize
spec:
  type: LoadBalancer
  selector:
    app: viize-dashboard
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
  namespace: viize
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: 9092
